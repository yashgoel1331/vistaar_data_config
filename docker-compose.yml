services:

  postgres:
    image: postgres:16
    restart: always
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: efwzThw2KHTNx6tLko6uy9dLtBratJYuxOy2mgBgc4Q

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: always
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:efwzThw2KHTNx6tLko6uy9dLtBratJYuxOy2mgBgc4Q@postgres:5432/postgres

  seed:
    build:
      context: .
      dockerfile: Dockerfile.backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:efwzThw2KHTNx6tLko6uy9dLtBratJYuxOy2mgBgc4Q@postgres:5432/postgres
    command: ["python", "-m", "database_create.seed_database"]
    restart: "no"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
